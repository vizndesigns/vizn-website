<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIZN Templates</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #F0F0F0; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .logo { font-family: 'Anton', sans-serif; font-size: 2.5rem; letter-spacing: 0.1em; color: #CCFF00; text-shadow: 0 0 30px rgba(204,255,0,0.5); margin-bottom: 1rem; }
    h1 { font-family: 'Anton', sans-serif; font-size: clamp(2rem, 6vw, 4rem); letter-spacing: 0.05em; margin-bottom: 1rem; }
    p { color: #AAAAAA; font-size: 1.1rem; margin-bottom: 2rem; }
    a { display: inline-block; background: #CCFF00; color: #000; font-family: 'Anton', sans-serif; font-size: 1rem; letter-spacing: 0.1em; padding: 0.8rem 2rem; text-decoration: none; border-radius: 4px; }
    a:hover { background: #b8e600; }
  </style>
</head>
<body>
  <div class="logo">VIZN</div>
  <h1>TEMPLATES</h1>
  <p>Our template library is coming soon.<br>Jump into the AI studio to generate custom designs now.</p>
  <a href="/">Back to Studio</a>
</body>
</html>
